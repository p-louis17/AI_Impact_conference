<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — {{ conf.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #2D1B8E;
      --teal: #00BCD4;
      --gray-50: #f9fafb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --error: #ef4444;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a0f5c 0%, #2D1B8E 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }
    .lock-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--purple), #1a0f5c);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.5rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--purple);
      margin-bottom: 0.35rem;
    }
    .subtitle { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 2rem; }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 0.75rem;
      color: var(--error);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .pin-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-500);
      text-align: left;
      margin-bottom: 0.4rem;
      display: block;
    }
    .pin-input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1.5rem;
      font-family: monospace;
      letter-spacing: 0.3em;
      text-align: center;
      border: 2px solid var(--gray-300);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    .pin-input:focus { border-color: var(--purple); }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--purple);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #3d2aaa; }

    .conf-name {
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="lock-icon">🔐</div>
  <h1>Admin Access</h1>
  <p class="subtitle">{{ conf.name }}</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <label class="pin-label" for="pin">Enter PIN</label>
    <input
      class="pin-input"
      type="password"
      id="pin"
      name="pin"
      maxlength="10"
      placeholder="••••"
      autofocus
      required
    />
    <button type="submit" class="btn">Enter Dashboard →</button>
  </form>

  <p class="conf-name">{{ conf.organizer }} · Staff Only</p>
</div>
</body>
</html>
